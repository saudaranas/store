<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSKedai Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#f97316;--primary-dark:#ea580c;--primary-light:#fff7ed;
            --dark:#0f172a;--dark-2:#1e293b;--dark-3:#334155;
            --gray:#64748b;--gray-light:#94a3b8;--gray-lighter:#cbd5e1;
            --border:#e2e8f0;--bg:#f8fafc;--bg-2:#f1f5f9;--white:#fff;
            --success:#16a34a;--success-light:#dcfce7;--success-dark:#065f46;
            --danger:#ef4444;--danger-light:#fee2e2;--danger-dark:#991b1b;
            --warning:#f59e0b;--warning-light:#fef3c7;
            --font:'Plus Jakarta Sans',sans-serif;
            --radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.06);
        }
        body{font-family:var(--font);background:var(--bg);color:var(--dark);min-height:100vh;}

        /* LOGIN */
        .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#fff7ed,#fed7aa,#fb923c);padding:24px;}
        .login-card{background:white;border-radius:28px;padding:48px 36px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,0.12);text-align:center;}
        .login-logo{font-size:2.2rem;font-weight:900;margin-bottom:4px;}
        .login-logo span:first-child{color:var(--primary);}
        .login-sub{font-size:0.85rem;color:var(--gray);margin-bottom:32px;font-weight:600;}
        .login-input{width:100%;padding:16px;border:2px solid var(--border);border-radius:14px;font-size:1rem;font-family:var(--font);outline:none;transition:border 0.2s;margin-bottom:14px;text-align:center;letter-spacing:3px;}
        .login-input:focus{border-color:var(--primary);}
        .login-btn{width:100%;padding:16px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:14px;font-weight:800;font-size:1rem;cursor:pointer;font-family:var(--font);box-shadow:0 6px 20px rgba(249,115,22,0.35);transition:all 0.2s;}
        .login-btn:hover{transform:translateY(-2px);}
        .login-err{color:var(--danger);font-size:0.82rem;margin-top:10px;display:none;font-weight:600;}

        /* APP */
        #adminApp{display:none;}
        .topbar{background:var(--dark-2);color:white;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
        .topbar-logo{font-weight:900;font-size:1.1rem;display:flex;align-items:center;gap:10px;}
        .topbar-logo span{color:var(--primary);}
        .topbar-badge{background:rgba(249,115,22,0.15);color:#fdba74;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700;border:1px solid rgba(249,115,22,0.2);}
        .topbar-right{display:flex;align-items:center;gap:10px;}
        .btn-sm{background:rgba(255,255,255,0.1);border:none;color:white;padding:6px 14px;border-radius:8px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:background 0.2s;}
        .btn-sm:hover{background:rgba(255,255,255,0.2);}
        .btn-sm.orange{background:var(--primary);color:white;}
        .btn-sm.orange:hover{background:var(--primary-dark);}

        /* TABS */
        .tabs{display:flex;gap:0;background:white;border-bottom:2px solid var(--border);padding:0 24px;position:sticky;top:56px;z-index:100;}
        .tab-btn{padding:14px 20px;font-size:0.82rem;font-weight:700;color:var(--gray);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;font-family:var(--font);}
        .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
        .tab-content{display:none;padding:20px 24px;max-width:1400px;margin:0 auto;}
        .tab-content.active{display:block;}

        /* STATS */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
        .stat-card{background:white;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border);}
        .stat-label{font-size:0.68rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
        .stat-val{font-size:1.7rem;font-weight:900;}
        .stat-val.orange{color:var(--primary);}
        .stat-val.green{color:var(--success);}
        .stat-val.red{color:var(--danger);}
        .stat-val.gray{color:var(--gray);}

        /* REGISTRY TABLE */
        .table-wrap{background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;}
        .table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
        .table-title{font-weight:800;font-size:0.95rem;}
        .table-search{padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.82rem;font-family:var(--font);outline:none;width:220px;}
        .table-search:focus{border-color:var(--primary);}
        table{width:100%;border-collapse:collapse;font-size:0.8rem;}
        th{background:var(--bg-2);padding:10px 14px;text-align:left;font-weight:700;color:var(--gray);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
        td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:var(--bg);}
        .badge{padding:3px 10px;border-radius:20px;font-size:0.68rem;font-weight:800;white-space:nowrap;}
        .badge-active{background:var(--success-light);color:var(--success-dark);}
        .badge-expired{background:var(--danger-light);color:var(--danger-dark);}
        .badge-warning{background:var(--warning-light);color:#78350f;}
        .badge-standard{background:#eff6ff;color:#1d4ed8;}
        .badge-setup{background:#faf5ff;color:#6d28d9;}
        .btn-edit{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.72rem;font-weight:700;cursor:pointer;color:var(--gray);font-family:var(--font);transition:all 0.2s;}
        .btn-edit:hover{border-color:var(--primary);color:var(--primary);}
        .btn-del{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.72rem;font-weight:700;cursor:pointer;color:var(--danger);font-family:var(--font);transition:all 0.2s;}
        .btn-del:hover{border-color:var(--danger);background:var(--danger-light);}

        /* CLIENT CARDS (Dashboard) */
        .client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
        .client-card{background:white;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all 0.2s;}
        .client-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.1);transform:translateY(-2px);}
        .cc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
        .cc-name{font-weight:800;font-size:0.92rem;}
        .cc-slug{font-size:0.68rem;color:var(--gray-light);margin-top:2px;}
        .cc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0;}
        .cc-stat{background:var(--bg);border-radius:8px;padding:7px 8px;text-align:center;}
        .cc-stat-label{font-size:0.6rem;color:var(--gray);font-weight:600;margin-bottom:2px;}
        .cc-stat-val{font-size:0.95rem;font-weight:900;}
        .cc-footer{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;}
        .cc-expiry{font-size:0.72rem;padding:5px 10px;border-radius:8px;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:5px;}
        .ce-ok{background:var(--success-light);color:var(--success-dark);}
        .ce-warn{background:var(--warning-light);color:#78350f;}
        .ce-exp{background:var(--danger-light);color:var(--danger-dark);}
        .ce-none{background:var(--bg-2);color:var(--gray);}
        .activity-row{display:flex;align-items:center;gap:7px;font-size:0.75rem;color:var(--gray);font-weight:600;}
        .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
        .dot-g{background:#22c55e;}
        .dot-y{background:#f59e0b;}
        .dot-r{background:#ef4444;}
        .dot-x{background:var(--gray-lighter);}
        .btn-link{flex:1;padding:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-size:0.7rem;font-weight:700;color:var(--gray);text-align:center;text-decoration:none;transition:all 0.2s;display:block;}
        .btn-link:hover{border-color:var(--primary);color:var(--primary);}
        .btn-link.primary-btn{background:var(--primary);border-color:var(--primary);color:white;}
        .btn-link.primary-btn:hover{background:var(--primary-dark);}

        /* MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;}
        .modal-overlay.show{display:flex;}
        .modal{background:white;border-radius:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,0.2);}
        .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
        .modal-title{font-weight:800;font-size:1rem;}
        .modal-close{background:var(--bg-2);border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
        .modal-body{padding:20px 24px;}
        .form-group{margin-bottom:14px;}
        .form-label{font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.04em;}
        .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.88rem;font-family:var(--font);outline:none;transition:border 0.2s;}
        .form-input:focus{border-color:var(--primary);}
        select.form-input{cursor:pointer;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
        .btn-cancel{padding:10px 20px;background:var(--bg-2);border:none;border-radius:10px;font-weight:700;font-size:0.85rem;cursor:pointer;font-family:var(--font);}
        .btn-save{padding:10px 24px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:10px;font-weight:800;font-size:0.85rem;cursor:pointer;font-family:var(--font);}

        /* LOADING */
        .loading-wrap{position:fixed;inset:0;background:rgba(255,255,255,0.9);backdrop-filter:blur(4px);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
        .loading-wrap.show{display:flex;}
        .spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-weight:700;color:var(--dark);}
        .loading-sub{font-size:0.8rem;color:var(--gray);}

        /* TOAST */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark-2);color:white;padding:10px 20px;border-radius:20px;font-size:0.82rem;font-weight:700;z-index:99999;display:none;animation:fadeInUp 0.3s ease;}
        @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        /* SALES MODAL */
        .sales-modal{max-width:680px;}
        .sales-day-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.82rem;}
        .sales-day-row:last-child{border:none;}
        .sales-day-label{width:70px;font-weight:700;color:var(--dark-3);}
        .sales-day-bar-wrap{flex:1;background:var(--bg-2);border-radius:20px;height:10px;overflow:hidden;}
        .sales-day-bar{height:100%;background:linear-gradient(90deg,#f97316,#ea580c);border-radius:20px;transition:width 0.5s ease;}
        .sales-day-val{width:80px;text-align:right;font-weight:800;color:var(--dark);}
        .sales-day-orders{width:60px;text-align:right;font-size:0.72rem;color:var(--gray);}
        .order-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:10px;background:var(--bg);margin-bottom:6px;font-size:0.8rem;}
        .order-row-left{display:flex;flex-direction:column;gap:2px;}
        .order-num{font-weight:800;color:var(--dark);}
        .order-meta{font-size:0.7rem;color:var(--gray);}
        .order-amount{font-weight:900;color:var(--success);font-size:0.9rem;}
        .sales-section-title{font-size:0.72rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px;}
        .chart-wrap{position:relative;height:180px;margin-bottom:4px;}
        .no-orders{text-align:center;padding:20px;color:var(--gray-light);font-size:0.82rem;}

        @media(max-width:600px){
            .tab-btn{padding:12px 12px;font-size:0.75rem;}
            .stats-grid{grid-template-columns:1fr 1fr;}
            .client-grid{grid-template-columns:1fr;}
            .tab-content{padding:14px;}
            table{display:block;overflow-x:auto;}
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
    <div class="login-card">
        <div class="login-logo"><span>POS</span><span>Kedai</span></div>
        <div class="login-sub">⚙️ Admin Dashboard</div>
        <input type="password" class="login-input" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" onclick="doLogin()">🔓 Log Masuk</button>
        <div class="login-err" id="loginErr">❌ Password salah!</div>
    </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
    <div class="topbar">
        <div class="topbar-logo"><span>POS</span>Kedai <span class="topbar-badge">Admin</span></div>
        <div class="topbar-right">
            <span style="font-size:0.72rem;color:var(--gray-light)" id="lastUpdated"></span>
            <button class="btn-sm orange" onclick="loadAllData()">🔄 Refresh</button>
            <button class="btn-sm" onclick="doLogout()">Keluar</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard',this)">📊 Dashboard</button>
        <button class="tab-btn" onclick="switchTab('registry',this)">📋 Registry</button>
        <button class="tab-btn" onclick="switchTab('tambah',this)">➕ Tambah Client</button>
    </div>

    <!-- TAB: DASHBOARD -->
    <div class="tab-content active" id="tab-dashboard">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-label">Jumlah Client</div><div class="stat-val" id="st-total">-</div></div>
            <div class="stat-card"><div class="stat-label">Aktif</div><div class="stat-val green" id="st-active">-</div></div>
            <div class="stat-card"><div class="stat-label">Expired</div><div class="stat-val red" id="st-expired">-</div></div>
            <div class="stat-card"><div class="stat-label">Hampir Luput</div><div class="stat-val orange" id="st-warning">-</div></div>
            <div class="stat-card"><div class="stat-label">Jualan 7 Hari</div><div class="stat-val orange" id="st-revenue">RM-</div></div>
            <div class="stat-card"><div class="stat-label">Pesanan 7 Hari</div><div class="stat-val" id="st-orders">-</div></div>
        </div>
        <div class="client-grid" id="clientGrid"></div>
    </div>

    <!-- TAB: REGISTRY -->
    <div class="tab-content" id="tab-registry">
        <div class="table-wrap">
            <div class="table-header">
                <div class="table-title">📋 Master Registry</div>
                <input type="text" class="table-search" placeholder="🔍 Cari kedai..." oninput="filterTable(this.value)" id="searchInput">
            </div>
            <div style="overflow-x:auto">
                <table id="registryTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nama Kedai</th>
                            <th>Slug</th>
                            <th>Status</th>
                            <th>Tarikh Luput</th>
                            <th>Baki Hari</th>
                            <th>Renew Type</th>
                            <th>WhatsApp</th>
                            <th>Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="registryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- TAB: TAMBAH CLIENT -->
    <div class="tab-content" id="tab-tambah">
        <div style="background:white;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);max-width:600px;">
            <div style="font-weight:800;font-size:1rem;margin-bottom:20px">➕ Tambah Client Baru</div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Slug *</label>
                    <input type="text" class="form-input" id="new-slug" placeholder="cth: nama-kedai">
                </div>
                <div class="form-group">
                    <label class="form-label">Nama Kedai *</label>
                    <input type="text" class="form-input" id="new-shopName" placeholder="cth: Kedai Makan Ali">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">GAS URL *</label>
                <input type="text" class="form-input" id="new-gasUrl" placeholder="https://script.google.com/macros/s/...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Tarikh Luput</label>
                    <input type="date" class="form-input" id="new-expiryDate">
                </div>
                <div class="form-group">
                    <label class="form-label">Renew Type</label>
                    <select class="form-input" id="new-renewType">
                        <option value="setup">Setup (RM80)</option>
                        <option value="standard">Standard (RM30)</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">WhatsApp</label>
                    <input type="text" class="form-input" id="new-whatsapp" placeholder="wa.me/601xxxxxxxx">
                </div>
                <div class="form-group">
                    <label class="form-label">Google Sheet URL</label>
                    <input type="text" class="form-input" id="new-googleSheet" placeholder="https://docs.google.com/...">
                </div>
            </div>
            <button onclick="tambahClient()" style="width:100%;padding:13px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:12px;font-weight:800;font-size:0.95rem;cursor:pointer;f
